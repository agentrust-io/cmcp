services:
  gateway:
    build: .
    ports:
      - "8443:8443"
    environment:
      CMCP_DEV_MODE: "1"
    volumes:
      - ./examples/config.yaml:/etc/cmcp/config.yaml:ro
      - ./examples/policy:/etc/cmcp/policy:ro
      - ./examples/catalog.json:/etc/cmcp/catalog.json:ro
    depends_on:
      - mock-mcp-server

  mock-mcp-server:
    image: python:3.11-slim
    ports:
      - "8080:8080"
    command: >
      python -c "
      import http.server, json, sys

      class Handler(http.server.BaseHTTPRequestHandler):
          def log_message(self, format, *args):
              pass
          def do_POST(self):
              length = int(self.headers.get('Content-Length', 0))
              body = self.rfile.read(length)
              try:
                  msg = json.loads(body)
              except Exception:
                  msg = {}
              response = json.dumps({
                  'jsonrpc': '2.0',
                  'id': msg.get('id'),
                  'result': {'content': [{'type': 'text', 'text': 'mock response'}]}
              }).encode()
              self.send_response(200)
              self.send_header('Content-Type', 'application/json')
              self.send_header('Content-Length', str(len(response)))
              self.end_headers()
              self.wfile.write(response)

      server = http.server.HTTPServer(('0.0.0.0', 8080), Handler)
      print('mock-mcp-server listening on :8080', flush=True)
      server.serve_forever()
      "
