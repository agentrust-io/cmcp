name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch or SHA to run CI on"
        required: false
        default: ""

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: python -m pip install --upgrade pip setuptools && pip install -e ".[dev]"

      - name: Security scan
        run: pip install bandit pip-audit && bandit -r src/ -c pyproject.toml && pip-audit

      - name: Lint
        run: ruff check src/ tests/

      - name: Type check
        run: mypy src/cmcp_runtime/

      - name: Test
        run: pytest tests/unit/ -v --tb=short --cov=src --cov-report=xml

      - name: Upload coverage report
        uses: codecov/codecov-action@v7
        with:
          fail_ci_if_error: false

  governance:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install --upgrade pip setuptools && pip install -e ".[dev]" agent-compliance

      - name: Generate evidence file
        run: python scripts/gen_agt_evidence.py

      - name: AGT governance verify (strict)
        run: agt verify --evidence agt-evidence.json

      - name: Save attestation JSON
        run: agt --json verify --evidence agt-evidence.json > agt-attestation.json

      - name: Upload governance artifacts
        uses: actions/upload-artifact@v7
        with:
          name: agt-governance-${{ github.sha }}
          path: |
            agt-evidence.json
            agt-attestation.json
          if-no-files-found: warn

  benchmark:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install --upgrade pip setuptools && pip install -e ".[dev]"

      - name: Run benchmark (software-only, CI gate p99 < 5ms)
        run: python -m cmcp_runtime.benchmarks --provider software-only --calls 10000 --out benchmarks/

      - name: Upload benchmark results
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-results
          path: benchmarks/
          if-no-files-found: warn
