<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d0a1f"/>
      <stop offset="100%" stop-color="#071828"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="400" height="400" fill="url(#bg)"/>
  <path d="M200,58 L326,112 L326,224 C326,298 268,340 200,360 C132,340 74,298 74,224 L74,112 Z"
        fill="url(#brand)" opacity="0.07"/>
  <path d="M200,58 L326,112 L326,224 C326,298 268,340 200,360 C132,340 74,298 74,224 L74,112 Z"
        fill="none" stroke="url(#brand)" stroke-width="3.5" opacity="0.55" stroke-linejoin="round"/>
  <!-- Padlock shackle -->
  <path d="M174,228 Q174,148 200,148 Q226,148 226,228"
        fill="none" stroke="url(#brand)" stroke-width="13" stroke-linecap="round"
        opacity="0.45" filter="url(#glow)"/>
  <!-- Padlock body fill -->
  <rect x="154" y="222" width="92" height="74" rx="12" fill="url(#brand)" opacity="0.08"/>
  <!-- Padlock body stroke -->
  <rect x="154" y="222" width="92" height="74" rx="12" fill="none" stroke="url(#brand)" stroke-width="3" opacity="0.55" filter="url(#glow)"/>
  <!-- Keyhole outer ring glow -->
  <circle cx="200" cy="251" r="18" fill="url(#brand)" opacity="0.35" filter="url(#glow)"/>
  <!-- Keyhole circle -->
  <circle cx="200" cy="251" r="11" fill="url(#brand)" filter="url(#glow)"/>
  <!-- Keyhole stem -->
  <rect x="196" y="259" width="8" height="18" rx="3" fill="url(#brand)" filter="url(#glow)"/>
  <!-- White center dot -->
  <circle cx="200" cy="251" r="4" fill="white" opacity="0.95"/>
</svg>
